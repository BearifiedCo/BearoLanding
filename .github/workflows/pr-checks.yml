name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Check if PR is ready for review
  pr-ready:
    name: PR Ready Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const hasDescription = body.length > 50;
            
            if (!hasDescription) {
              core.setFailed('PR description is too short. Please provide a detailed description.');
            }

      - name: Check for required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            // Add any required labels here if needed
            // if (!labels.includes('ready-for-review')) {
            //   core.setFailed('PR must have "ready-for-review" label');
            // }

  # Comment on PR with deployment info
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🚀 Deployment Information
            
            Once this PR is merged to \`main\`, it will automatically deploy to **staging**.
            
            ### Next Steps:
            1. ✅ Wait for all checks to pass
            2. ✅ Get at least one approval
            3. ✅ Merge to \`main\` branch
            4. 🚀 Automatic deployment to staging will begin
            
            ### Environments:
            - **Staging**: \`main\` branch → Auto-deploys on merge
            - **Production**: \`release\` branch → Requires separate PR
            
            ---
            *This comment is automatically generated by the CI/CD pipeline.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

