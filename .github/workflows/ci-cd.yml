name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - release

env:
  NODE_VERSION: '20'

jobs:
  # Test job - runs on PRs and pushes to main
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Check for build errors
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed - .next directory not found"
            exit 1
          fi

  # Deploy to Staging (main branch)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.after != '0000000000000000000000000000000000000000'
    environment:
      name: staging
      url: https://bearo-staging.vercel.app  # Update with your staging URL
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to Staging environment..."
          # Add your deployment commands here
          # Example for Vercel:
          # npm i -g vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          # Or for other platforms, add your deployment script

      - name: Deployment Summary
        run: |
          echo "✅ Successfully deployed to Staging"
          echo "Environment: Staging"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

  # Deploy to Production (release branch)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    environment:
      name: production
      url: https://bearo.app  # Update with your production URL
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production environment..."
          # Add your deployment commands here
          # Example for Vercel:
          # npm i -g vercel
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
          # Or for other platforms, add your deployment script

      - name: Deployment Summary
        run: |
          echo "✅ Successfully deployed to Production"
          echo "Environment: Production"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

  # Notify on deployment
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - name: Notify team
        run: |
          echo "📢 Deployment notification"
          # Add notification logic here (Slack, email, etc.)

